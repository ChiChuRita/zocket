services:
  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  gateway:
    build:
      context: .
      dockerfile: packages/gateway/Dockerfile
    ports:
      - "3001:3000"
    environment:
      NATS_URL: nats://nats:4222
      PORT: "3000"
    depends_on:
      - nats

  runtime:
    build:
      context: .
      dockerfile: packages/runtime/Dockerfile
    ports:
      - "8080:8080"
    environment:
      NATS_URL: nats://nats:4222
      API_PORT: "8080"
    depends_on:
      - nats

volumes:
  nats-data:
